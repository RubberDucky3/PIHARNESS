<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; width: 100%; height: 100%; background: #87CEEB; touch-action: manipulation; }
  #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  #title { position: absolute; top: 18%; left: 0; width: 100%; text-align: center; font-family: 'Arial Black', Arial, sans-serif; font-size: 52px; color: #fff; text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; letter-spacing: 2px; }
  #score { position: absolute; top: 28px; width: 100%; text-align: center; font-family: 'Arial Black', Arial, sans-serif; font-size: 56px; font-weight: bold; color: #fff; text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; }
  #gameOver { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.75); padding: 30px 40px; border-radius: 16px; text-align: center; pointer-events: auto; border: 2px solid rgba(255,255,255,0.3); }
  #gameOver h2 { font-family: 'Arial Black', Arial, sans-serif; font-size: 36px; color: #ff4444; margin-bottom: 12px; text-shadow: 2px 2px 0 #000; }
  #gameOver p { font-family: Arial, sans-serif; font-size: 20px; color: #fff; margin: 6px 0; }
  #gameOver button { margin-top: 18px; padding: 12px 32px; font-family: 'Arial Black', Arial, sans-serif; font-size: 20px; background: #4CAF50; color: #fff; border: none; border-radius: 8px; cursor: pointer; pointer-events: auto; box-shadow: 0 4px 0 #2E7D32; transition: transform 0.1s; }
  #gameOver button:active { transform: translateY(2px); box-shadow: 0 2px 0 #2E7D32; }
  #hint { position: absolute; bottom: 12%; width: 100%; text-align: center; font-family: Arial, sans-serif; font-size: 18px; color: #fff; text-shadow: 2px 2px 0 rgba(0,0,0,0.5); }
</style>
</head>
<body>
<div id="ui">
  <div id="title">FLAPPY 3D</div>
  <div id="score"></div>
  <div id="hint">SPACE / CLICK / TAP TO FLAP</div>
  <div id="gameOver">
    <h2>GAME OVER</h2>
    <p id="finalScore">Score: 0</p>
    <p id="bestScore">Best: 0</p>
    <button id="restartBtn">PLAY AGAIN</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  'use strict';

  var GRAVITY        = -22;
  var FLAP_VEL       =  8.6;
  var BASE_SPEED     =  4.2;
  var GAP_SIZE       =  3.2;
  var PIPE_INTERVAL  =  2.4;
  var PIPE_HH        =  6;    // half pipe body height

  var ST_WAIT = 0, ST_PLAY = 1, ST_DEAD = 2;
  var state = ST_WAIT;
  var score = 0;
  var best  = parseInt(localStorage.getItem('fb3d_best') || '0', 10);

  var birdVel   = 0;
  var birdY     = 0;
  var pipeSpeed = BASE_SPEED;
  var pipeTimer = 0;
  var firstPipe = false;
  var deadTimer = 0;
  var canRestart = false;

  var scene, camera, renderer, bird, pipes = [], clouds = [], pipeMeshes = [], clock;

  function rand(a, b) { return Math.random() * (b - a) + a; }
  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

  function init() {
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 13);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x87CEEB);   // sky blue — explicit, NOT scene.background
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    var sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(5, 10, 5);
    scene.add(sun);

    // ── Bird ─────────────────────────────────────────────────────────────────
    bird = new THREE.Mesh(
      new THREE.BoxGeometry(0.6, 0.46, 0.46),
      new THREE.MeshLambertMaterial({ color: 0xFFD700 })
    );
    bird.position.set(-2, 0, 0);
    scene.add(bird);

    // ── Ground ───────────────────────────────────────────────────────────────
    var ground = new THREE.Mesh(
      new THREE.BoxGeometry(60, 1, 3),
      new THREE.MeshLambertMaterial({ color: 0x5D8A3C })
    );
    ground.position.set(0, -5.5, 0);
    scene.add(ground);

    // ── Clouds ───────────────────────────────────────────────────────────────
    var cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
    for (var c = 0; c < 6; c++) {
      var cg = new THREE.Group();
      var c1 = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.7, 0.7), cloudMat);
      var c2 = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.7, 0.7), cloudMat);
      c2.position.set(1.4, 0.5, 0);
      var c3 = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.7, 0.7), cloudMat);
      c3.position.set(-1.3, 0.3, 0);
      cg.add(c1); cg.add(c2); cg.add(c3);
      cg.position.set(rand(-18, 18), rand(3, 7), rand(-8, -2));
      cg.userData.speed = rand(0.3, 0.8);
      scene.add(cg);
      clouds.push(cg);
    }

    clock = new THREE.Clock();

    window.addEventListener('resize', function() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    window.addEventListener('keydown', function(e) {
      if (e.code === 'Space') { e.preventDefault(); flap(); }
    });
    document.addEventListener('mousedown', function() { flap(); });
    document.addEventListener('touchstart', function(e) { e.preventDefault(); flap(); }, { passive: false });

    document.getElementById('restartBtn').addEventListener('click', function(e) {
      e.stopPropagation();
      if (canRestart) { restart(); }
    });

    animate();
  }

  function flap() {
    if (state === ST_WAIT)            { startPlay(); }
    else if (state === ST_PLAY)       { birdVel = FLAP_VEL; }
    else if (state === ST_DEAD && canRestart) { restart(); }
  }

  function startPlay() {
    state     = ST_PLAY;
    birdVel   = FLAP_VEL;
    score     = 0;
    pipeSpeed = BASE_SPEED;
    pipeTimer = 0;
    firstPipe = false;
    document.getElementById('title').style.display  = 'none';
    document.getElementById('hint').style.display   = 'none';
    document.getElementById('score').textContent    = '0';
    clearPipes();
  }

  function die() {
    if (state !== ST_PLAY) return;
    state     = ST_DEAD;
    deadTimer = 0;
    canRestart = false;
    document.getElementById('gameOver').style.display = 'none';
  }

  function restart() {
    state      = ST_WAIT;
    birdVel    = 0;
    birdY      = 0;
    pipeSpeed  = BASE_SPEED;
    pipeTimer  = 0;
    firstPipe  = false;
    deadTimer  = 0;
    canRestart = false;
    bird.position.set(-2, 0, 0);
    bird.rotation.set(0, 0, 0);
    document.getElementById('score').textContent         = '';
    document.getElementById('title').style.display       = 'block';
    document.getElementById('hint').style.display        = 'block';
    document.getElementById('gameOver').style.display    = 'none';
    clearPipes();
  }

  function clearPipes() {
    for (var i = 0; i < pipeMeshes.length; i++) scene.remove(pipeMeshes[i]);
    pipeMeshes = [];
    pipes      = [];
  }

  function spawnPipe() {
    var gapC    = rand(-2, 2);
    // Pipe body centres — must be gap_edge ± half_height (6)
    var topBodyY = gapC + GAP_SIZE / 2 + PIPE_HH;   // top pipe center above gap
    var botBodyY = gapC - GAP_SIZE / 2 - PIPE_HH;   // bottom pipe center below gap
    // Caps sit at the gap edge (mouth of each pipe)
    var topCapY  = gapC + GAP_SIZE / 2 - 0.18;
    var botCapY  = gapC - GAP_SIZE / 2 + 0.18;

    var grn  = new THREE.MeshLambertMaterial({ color: 0x2ECC40 });
    var dark = new THREE.MeshLambertMaterial({ color: 0x1B7A28 });
    var grp  = [];

    function mk(geo, mat, y) {
      var m = new THREE.Mesh(geo, mat);
      m.position.set(12, y, 0);
      scene.add(m);
      grp.push(m);
      return m;
    }

    mk(new THREE.BoxGeometry(1.2,  12,   1.2),  grn,  topBodyY);
    mk(new THREE.BoxGeometry(1.48, 0.36, 1.48), dark, topCapY);
    mk(new THREE.BoxGeometry(1.2,  12,   1.2),  grn,  botBodyY);
    mk(new THREE.BoxGeometry(1.48, 0.36, 1.48), dark, botCapY);

    pipes.push({ gapC: gapC, meshes: grp, scored: false });
    pipeMeshes = pipeMeshes.concat(grp);
  }

  function updatePipes(dt) {
    var move = pipeSpeed * dt;
    for (var i = 0; i < pipes.length; i++) {
      var p = pipes[i];
      for (var j = 0; j < p.meshes.length; j++) {
        p.meshes[j].position.x -= move;
      }
      if (!p.scored && p.meshes[0].position.x < bird.position.x) {
        p.scored = true;
        score++;
        document.getElementById('score').textContent = score;
        pipeSpeed = BASE_SPEED + Math.floor(score / 5) * 0.3;
      }
    }
    // Remove off-screen
    while (pipes.length && pipes[0].meshes[0].position.x < -15) {
      var old = pipes.shift();
      for (var k = 0; k < old.meshes.length; k++) {
        scene.remove(old.meshes[k]);
        var idx = pipeMeshes.indexOf(old.meshes[k]);
        if (idx !== -1) pipeMeshes.splice(idx, 1);
      }
    }
  }

  function checkCollision() {
    var bx = bird.position.x;
    var by = bird.position.y;

    if (by - 0.23 < -5.15 || by + 0.23 > 5.15) { die(); return; }

    for (var i = 0; i < pipes.length; i++) {
      var p  = pipes[i];
      var px = p.meshes[0].position.x;
      var topY = p.gapC + GAP_SIZE / 2 + PIPE_HH;
      var botY = p.gapC - GAP_SIZE / 2 - PIPE_HH;
      if (Math.abs(bx - px) < 0.90) {
        if (Math.abs(by - topY) < 6.23 || Math.abs(by - botY) < 6.23) {
          die(); return;
        }
      }
    }
  }

  function animate() {
    requestAnimationFrame(animate);
    var dt = Math.min(clock.getDelta(), 0.05);

    // Clouds
    for (var ci = 0; ci < clouds.length; ci++) {
      clouds[ci].position.x -= clouds[ci].userData.speed * dt;
      if (clouds[ci].position.x < -22) {
        clouds[ci].position.set(22, rand(3, 7), rand(-8, -2));
      }
    }

    if (state === ST_WAIT) {
      birdY = Math.sin(clock.getElapsedTime() * 2.3) * 0.42;
      bird.position.set(-2, birdY, 0);
      bird.rotation.z = Math.sin(clock.getElapsedTime() * 2.3) * 0.08;
    }

    if (state === ST_PLAY) {
      pipeTimer += dt;
      if (!firstPipe && pipeTimer >= 1.0)          { spawnPipe(); firstPipe = true; pipeTimer = 0; }
      else if (firstPipe && pipeTimer >= PIPE_INTERVAL) { spawnPipe(); pipeTimer = 0; }

      birdVel += GRAVITY * dt;
      birdY   += birdVel * dt;
      bird.position.set(-2, birdY, 0);
      bird.rotation.z = clamp(birdVel * 0.055, -0.5, 0.85);

      updatePipes(dt);
      checkCollision();
    }

    if (state === ST_DEAD) {
      birdVel += GRAVITY * dt;
      birdY   += birdVel * dt;
      if (birdY - 0.23 < -5.15) { birdY = -5.15 + 0.23; birdVel = 0; }
      bird.position.set(-2, birdY, 0);
      bird.rotation.z = Math.max(bird.rotation.z - dt * 4, -1.5);

      deadTimer += dt;
      if (deadTimer > 0.6 && !canRestart) {
        canRestart = true;
        if (score > best) { best = score; localStorage.setItem('fb3d_best', String(best)); }
        document.getElementById('finalScore').textContent = 'Score: ' + score;
        document.getElementById('bestScore').textContent  = 'Best: '  + best;
        document.getElementById('gameOver').style.display = 'block';
      }
    }

    renderer.render(scene, camera);
  }

  init();
})();
</script>
</body>
</html>
