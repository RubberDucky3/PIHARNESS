<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #5DC0E8; display: flex;
         justify-content: center; align-items: center; height: 100vh; }
  canvas { display: block; cursor: pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function () {
  'use strict';

  var canvas = document.getElementById('c');
  var ctx    = canvas.getContext('2d');

  // ── Virtual dimensions (game logic always uses these) ──────────────────────
  var VW = 480, VH = 640;
  var scale = 1;

  function resize() {
    scale = Math.min(window.innerWidth / VW, window.innerHeight / VH);
    canvas.width  = Math.round(VW * scale);
    canvas.height = Math.round(VH * scale);
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Physics constants ──────────────────────────────────────────────────────
  var GRAVITY          = 1500;   // px/s² downward
  var FLAP_VEL         = -530;   // px/s upward on tap
  var BASE_PIPE_SPEED  = 185;    // px/s
  var PIPE_INTERVAL    = 1.55;   // seconds between pipe pairs
  var PIPE_GAP         = 148;    // vertical gap
  var PIPE_W           = 68;
  var CAP_H            = 22;
  var CAP_EXTRA        = 7;      // cap wider than body on each side
  var GROUND_H         = 80;
  var BIRD_CX          = 120;    // bird stays at fixed X
  var BIRD_RX          = 19;     // half-width (collision)
  var BIRD_RY          = 14;     // half-height (collision)

  // ── Game state ─────────────────────────────────────────────────────────────
  var S_WAIT = 0, S_PLAY = 1, S_DEAD = 2;
  var state, birdY, birdVel, pipes, pipeSpeed,
      timeSinceSpawn, score, wingPhase, deathTimer;

  var best = parseInt(localStorage.getItem('fb_best') || '0', 10);

  function reset() {
    birdY          = VH / 2 - 40;
    birdVel        = 0;
    pipes          = [];
    pipeSpeed      = BASE_PIPE_SPEED;
    timeSinceSpawn = PIPE_INTERVAL;  // spawn first pipe right away
    score          = 0;
    wingPhase      = 0;
    deathTimer     = 0;
  }

  function flap() {
    if (state === S_WAIT) {
      state   = S_PLAY;
      birdVel = FLAP_VEL;
      return;
    }
    if (state === S_PLAY) {
      birdVel = FLAP_VEL;
    }
    if (state === S_DEAD && deathTimer > 0.55) {
      reset();
      state   = S_PLAY;
      birdVel = FLAP_VEL;
    }
  }

  // ── Controls ───────────────────────────────────────────────────────────────
  document.addEventListener('keydown', function (e) {
    if (e.code === 'Space') { e.preventDefault(); flap(); }
  });
  canvas.addEventListener('click',      function () { flap(); });
  canvas.addEventListener('touchstart', function (e) { e.preventDefault(); flap(); },
                          { passive: false });

  // ── Clouds (background, parallax) ─────────────────────────────────────────
  var clouds = [];
  for (var ci = 0; ci < 6; ci++) {
    clouds.push({
      x:     Math.random() * VW,
      y:     30 + Math.random() * 180,
      w:     70 + Math.random() * 90,
      speed: 18 + Math.random() * 22
    });
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y,     x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x,     y + h, r);
    ctx.arcTo(x,     y + h, x,     y,     r);
    ctx.arcTo(x,     y,     x + w, y,     r);
    ctx.closePath();
  }

  function die() {
    if (state === S_DEAD) return;
    state = S_DEAD;
    if (score > best) {
      best = score;
      localStorage.setItem('fb_best', best);
    }
  }

  // ── Draw routines ──────────────────────────────────────────────────────────
  function drawSky() {
    var g = ctx.createLinearGradient(0, 0, 0, VH - GROUND_H);
    g.addColorStop(0,   '#4BB8E8');
    g.addColorStop(1,   '#9DD8F5');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, VW, VH - GROUND_H);
  }

  function drawCloud(c) {
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.beginPath();
    ctx.arc(c.x,            c.y,           c.w * 0.30, 0, Math.PI * 2);
    ctx.arc(c.x + c.w*0.25, c.y - c.w*0.08, c.w * 0.24, 0, Math.PI * 2);
    ctx.arc(c.x + c.w*0.50, c.y,           c.w * 0.28, 0, Math.PI * 2);
    ctx.arc(c.x + c.w*0.22, c.y + c.w*0.06, c.w * 0.20, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawGround() {
    // Grass strip
    ctx.fillStyle = '#5AAA27';
    ctx.fillRect(0, VH - GROUND_H, VW, 14);
    ctx.fillStyle = '#3D8A18';
    ctx.fillRect(0, VH - GROUND_H + 14, VW, GROUND_H - 14);
    // Dirt lines
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 1;
    for (var i = 1; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(0,  VH - GROUND_H + 14 + i * 13);
      ctx.lineTo(VW, VH - GROUND_H + 14 + i * 13);
      ctx.stroke();
    }
  }

  function drawPipe(px, gapTop) {
    var gapBot = gapTop + PIPE_GAP;

    // Pipe colour gradient (shared)
    var g = ctx.createLinearGradient(px, 0, px + PIPE_W, 0);
    g.addColorStop(0,    '#3AAA46');
    g.addColorStop(0.38, '#55D467');
    g.addColorStop(1,    '#287833');

    // ── Top pipe ──────────────────────────────────────────────────────────
    // Body
    ctx.fillStyle = g;
    ctx.fillRect(px, 0, PIPE_W, gapTop - CAP_H);
    // Dark edge
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(px, 0, 5, gapTop - CAP_H);
    // Cap
    ctx.fillStyle = '#287833';
    ctx.fillRect(px - CAP_EXTRA, gapTop - CAP_H, PIPE_W + CAP_EXTRA * 2, CAP_H);
    ctx.fillStyle = '#55D467';
    ctx.fillRect(px - CAP_EXTRA, gapTop - CAP_H, PIPE_W + CAP_EXTRA * 2, 5);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(px - CAP_EXTRA, gapTop - 4, PIPE_W + CAP_EXTRA * 2, 4);

    // ── Bottom pipe ───────────────────────────────────────────────────────
    var botBodyTop = gapBot + CAP_H;
    var botBodyH   = VH - GROUND_H - botBodyTop;
    // Body
    ctx.fillStyle = g;
    ctx.fillRect(px, botBodyTop, PIPE_W, botBodyH);
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(px, botBodyTop, 5, botBodyH);
    // Cap
    ctx.fillStyle = '#287833';
    ctx.fillRect(px - CAP_EXTRA, gapBot, PIPE_W + CAP_EXTRA * 2, CAP_H);
    ctx.fillStyle = '#55D467';
    ctx.fillRect(px - CAP_EXTRA, gapBot, PIPE_W + CAP_EXTRA * 2, 5);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(px - CAP_EXTRA, gapBot + CAP_H - 4, PIPE_W + CAP_EXTRA * 2, 4);
  }

  function drawBird(by, vel) {
    var cx = BIRD_CX, cy = by;
    var wing = Math.sin(wingPhase) * 7;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + BIRD_RY + 4, BIRD_RX * 0.9, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wing (back)
    ctx.fillStyle = '#E8A000';
    ctx.beginPath();
    ctx.ellipse(cx - 5, cy + wing, 15, 9, -0.25, 0, Math.PI * 2);
    ctx.fill();

    // Body
    var bg = ctx.createRadialGradient(cx - 4, cy - 5, 2, cx, cy, BIRD_RX + 2);
    bg.addColorStop(0, '#FFE84A');
    bg.addColorStop(1, '#F0A800');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.ellipse(cx, cy, BIRD_RX + 2, BIRD_RY + 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#C07800';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Eye white
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx + 9, cy - 5, 7.5, 0, Math.PI * 2);
    ctx.fill();
    // Pupil
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(cx + 11, cy - 5, 4, 0, Math.PI * 2);
    ctx.fill();
    // Shine
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx + 12.5, cy - 6.5, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    var tilt = Math.max(-0.3, Math.min(0.35, vel / 900));
    ctx.save();
    ctx.translate(cx + BIRD_RX - 2, cy + 1);
    ctx.rotate(tilt);
    ctx.fillStyle = '#FF7700';
    ctx.beginPath();
    ctx.moveTo(0, -4);
    ctx.lineTo(15, 1);
    ctx.lineTo(0, 5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#CC4400';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }

  function drawScoreHUD() {
    ctx.textAlign = 'center';
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.font = 'bold 58px Arial, sans-serif';
    ctx.fillText(score, VW / 2 + 2, 82);
    // Main
    ctx.fillStyle = '#fff';
    ctx.fillText(score, VW / 2, 80);
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeText(score, VW / 2, 80);
  }

  function drawWaitScreen() {
    ctx.textAlign = 'center';
    ctx.font = 'bold 52px Arial, sans-serif';
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.lineWidth = 5;
    ctx.strokeText('Flappy Bird', VW / 2, 210);
    ctx.fillStyle = '#fff';
    ctx.fillText('Flappy Bird', VW / 2, 210);

    // Pulsing hint
    var alpha = 0.55 + 0.45 * Math.sin(Date.now() * 0.004);
    ctx.globalAlpha = alpha;
    ctx.font = '26px Arial, sans-serif';
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 3;
    ctx.strokeText('Tap or press SPACE', VW / 2, 290);
    ctx.fillStyle = '#fff';
    ctx.fillText('Tap or press SPACE', VW / 2, 290);
    ctx.globalAlpha = 1;
  }

  function drawGameOverPanel() {
    // Dark overlay
    ctx.fillStyle = 'rgba(0,0,0,0.40)';
    ctx.fillRect(0, 0, VW, VH);

    // Panel
    var px = VW/2 - 155, py = VH/2 - 130, pw = 310, ph = 260;
    roundRect(px, py, pw, ph, 18);
    ctx.fillStyle = 'rgba(10,10,30,0.82)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.textAlign = 'center';

    // Title
    ctx.font = 'bold 46px Arial, sans-serif';
    ctx.fillStyle = '#FF4444';
    ctx.strokeStyle = '#800';
    ctx.lineWidth = 3;
    ctx.strokeText('GAME OVER', VW/2, py + 60);
    ctx.fillText('GAME OVER', VW/2, py + 60);

    // Score
    ctx.font = '30px Arial, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText('Score  ' + score, VW/2, py + 115);

    // Best
    ctx.font = '28px Arial, sans-serif';
    ctx.fillStyle = '#FFD700';
    ctx.fillText('Best  ' + best, VW/2, py + 158);

    // Replay prompt (delayed)
    if (deathTimer > 0.55) {
      var a2 = 0.6 + 0.4 * Math.sin(Date.now() * 0.005);
      ctx.globalAlpha = a2;
      ctx.font = '22px Arial, sans-serif';
      ctx.fillStyle = '#9CF';
      ctx.fillText('Tap to play again', VW/2, py + 222);
      ctx.globalAlpha = 1;
    }
  }

  // ── Main loop ──────────────────────────────────────────────────────────────
  var lastTs = null;

  function loop(ts) {
    requestAnimationFrame(loop);

    if (lastTs === null) { lastTs = ts; }
    var dt = Math.min((ts - lastTs) / 1000, 0.05);
    lastTs = ts;

    // ── Update ───────────────────────────────────────────────────────────────
    for (var ci = 0; ci < clouds.length; ci++) {
      clouds[ci].x -= clouds[ci].speed * dt;
      if (clouds[ci].x + clouds[ci].w < 0) {
        clouds[ci].x = VW + 40;
        clouds[ci].y = 30 + Math.random() * 180;
      }
    }

    if (state === S_WAIT) {
      birdY     = VH/2 - 60 + Math.sin(ts * 0.0028) * 14;
      wingPhase = ts * 0.008;
    }

    if (state === S_PLAY) {
      birdVel    += GRAVITY * dt;
      birdY      += birdVel * dt;
      wingPhase  += (Math.abs(birdVel) * 0.004 + 5) * dt;

      timeSinceSpawn += dt;
      if (timeSinceSpawn >= PIPE_INTERVAL) {
        timeSinceSpawn = 0;
        var minGT = 70;
        var maxGT = VH - GROUND_H - PIPE_GAP - 70;
        pipes.push({
          x:      VW + PIPE_W + CAP_EXTRA,
          gapTop: minGT + Math.random() * (maxGT - minGT),
          scored: false
        });
      }

      for (var pi = pipes.length - 1; pi >= 0; pi--) {
        pipes[pi].x -= pipeSpeed * dt;

        // Score when bird clears pipe
        if (!pipes[pi].scored && pipes[pi].x + PIPE_W < BIRD_CX) {
          pipes[pi].scored = true;
          score++;
          pipeSpeed = BASE_PIPE_SPEED + Math.floor(score / 5) * 14;
        }

        if (pipes[pi].x + PIPE_W + CAP_EXTRA < -20) {
          pipes.splice(pi, 1);
        }
      }

      // Collision: ground / ceiling
      if (birdY + BIRD_RY >= VH - GROUND_H || birdY - BIRD_RY <= 0) {
        die();
      }

      // Collision: pipes (AABB using cap dimensions)
      for (var pi = 0; pi < pipes.length; pi++) {
        var p = pipes[pi];
        var pL = p.x - CAP_EXTRA;
        var pR = p.x + PIPE_W + CAP_EXTRA;
        var bL = BIRD_CX - BIRD_RX + 3;
        var bR = BIRD_CX + BIRD_RX - 3;
        var bT = birdY  - BIRD_RY + 3;
        var bB = birdY  + BIRD_RY - 3;

        if (bR > pL && bL < pR) {
          // Inside horizontal span — check vertical
          if (bT < p.gapTop || bB > p.gapTop + PIPE_GAP) {
            die();
            break;
          }
        }
      }
    }

    if (state === S_DEAD) {
      deathTimer += dt;
      birdVel    += GRAVITY * dt;
      birdY      += birdVel * dt;
      birdY       = Math.min(birdY, VH - GROUND_H - BIRD_RY);
    }

    // ── Draw ─────────────────────────────────────────────────────────────────
    ctx.save();
    ctx.scale(scale, scale);

    drawSky();
    for (var ci = 0; ci < clouds.length; ci++) drawCloud(clouds[ci]);

    // Draw pipes behind bird
    for (var pi = 0; pi < pipes.length; pi++) {
      drawPipe(pipes[pi].x, pipes[pi].gapTop);
    }

    drawGround();

    // Bird (tilt with velocity)
    ctx.save();
    var tilt = Math.max(-0.45, Math.min(0.9, birdVel / 620));
    ctx.translate(BIRD_CX, birdY);
    ctx.rotate(tilt);
    ctx.translate(-BIRD_CX, -birdY);
    drawBird(birdY, birdVel);
    ctx.restore();

    // Overlay UI
    if (state === S_WAIT) drawWaitScreen();
    if (state === S_PLAY) drawScoreHUD();
    if (state === S_DEAD) { drawScoreHUD(); drawGameOverPanel(); }

    ctx.restore();
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  reset();
  state = S_WAIT;
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
